rrt_planner_node:
  ros__parameters:
    # Distance the tree extends per iteration (metres)
    step_size: 0.10

    # Maximum RRT iterations
    max_iterations: 5000

    # Fraction of samples directed straight at the goal (0.0–1.0)
    goal_bias: 0.10

    # Distance from goal at which we declare success (metres)
    goal_threshold: 0.20

    # Obstacle inflation radius (metres).
    inflation_radius: 0.15
